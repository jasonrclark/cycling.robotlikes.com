<html>
  <head>
    <title>Robot Likes Cycling</title>
    <link rel="stylesheet" href="https://jasonrclark.com/css/pixyll.css" type="text/css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.js"></script>

    <!-- Timescale -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-moment/1.0.0/chartjs-adapter-moment.min.js"></script>

    <!-- Zoomin' -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/1.2.1/chartjs-plugin-zoom.min.js"></script>

    <script src="./code.js"></script>

    <style>
      h1 {
        text-align: center;
      }

      h3 span {
        font-weight:normal;
      }

      h3 {
        color: #0B2161;
      }

      .chart {
        float:left;
        height:325px;
        width:600px
      }

      .vanity {
        padding:20px;
        float:left;
      }

      #insights {
        clear:both;
        margin-top:30px;
        padding:20px;
        border:1px solid #0B2161;
        border-radius:6px;
        background:#f5f7fc;
      }

      #insights h2 {
        color:#0B2161;
        margin-top:0;
      }

      #insights ul {
        margin:0 0 10px 0;
        padding-left:20px;
      }

      #insights li {
        margin-bottom:6px;
      }

      #insights .insights-section-label {
        font-weight:bold;
        color:#0B2161;
        margin:10px 0 4px 0;
      }
    </style>
  </head>
  <body style="padding:20px;width:1100px;margin:0 auto;">
    <h1 class="post-title">Robot Likes Cycling <a href="/walking.html">&#128694;</a></h1>
 
    <div>
      <div class="chart">
        <canvas id="perDistanceChart"></canvas>
      </div>
      <div class="vanity">
        <h3>Max: <span id="maxDistance"></span></h3>
        <h3>Ave: <span id="averageDistance"></span></h3>
        <h3>Count: <span id="countDistance"></span></h3>
      </div>
    </div>

    <div>
      <div class="chart">
        <canvas id="totalDistanceChart"></canvas>
      </div>
      <div class="vanity">
        <h3>Total: <span id="totalDistance"></span></h3>
        <h3>Total Hours: <span id="totalHours"></span></h3>
        <h3>Total Days: <span id="totalDays"></span></h3>
      </div>
    </div>

    <div>
      <div class="chart">
        <canvas id="averageSpeedChart"></canvas>
      </div>
      <div class="vanity">
        <h3>Average: <span id="averageSpeed"></span></span></h3>
        <h3>Max: <span id="maxSpeed"></span></h3>
      </div>
    </div>

    <div id="insights" style="display:none">
      <h2>🤖 AI Ride Insights</h2>
      <div class="insights-section-label">Takeaways</div>
      <ul id="insights-takeaways"></ul>
      <div class="insights-section-label">Recommended Next Actions</div>
      <ul id="insights-actions"></ul>
    </div>

    <script>
      var rides = [];
      fetch('/rides.json')
        .then((response) => response.json())
        .then((data) => {
          rides = data;
          rides.sort(rideDateComparer);

          var totalDistance = 0;
          var totalTime = 0;
          const totals = rides.map(ride => {
            totalDistance += ride.distance;
            totalTime += ride.duration
            return {
              ...ride,
              totalDistance,
              totalTime,
            };
          });

          chart({
            data: rides,
            elementName: 'perDistanceChart',
            title: 'Ride Distance (miles)',
            type: 'bar',
            yAxisKey: 'distance',
          });

          chart({
            data: totals,
            elementName: 'totalDistanceChart',
            title: 'Total Distance (miles)',
            type: 'scatter',
            yAxisKey: 'totalDistance',
          });

          chart({
            data: rides,
            elementName: 'averageSpeedChart',
            title: 'Average Speed (mph)',
            type: 'scatter',
            yAxisKey: 'average_speed',
          });

          vanityDistance({
            elementName: 'maxDistance',
            value: Math.max(...rides.map(r => r.distance)),
          });

          vanity({
            elementName: 'countDistance',
            value: rides.length,
            fixed: 0,
          });

          vanity({
            elementName: 'totalHours',
            value: totalTime / 60 / 60,
            fixed: 0,
            unit: 'hours',
          });

          vanity({
            elementName: 'totalDays',
            value: totalTime / 60 / 60 / 24,
            fixed: 0,
            unit: 'days',
          });

          vanityDistance({
            elementName: 'averageDistance',
            value: (totalDistance / rides.length),
          });

          vanityDistance({
            elementName: 'totalDistance',
            value: totalDistance,
          });

          vanitySpeed({
            elementName: 'averageSpeed',
            value: (rides.reduce((prior, ride) => prior + ride.average_speed, 0) / rides.length),
          });

          vanitySpeed({
            elementName: 'maxSpeed',
            value: Math.max(...rides.map(r => r.max_speed)),
          });

          const insights = generateRideInsights(rides);
          const takeawaysList = document.getElementById('insights-takeaways');
          const actionsList = document.getElementById('insights-actions');
          insights.takeaways.forEach(t => {
            const li = document.createElement('li');
            li.textContent = t;
            takeawaysList.appendChild(li);
          });
          insights.actions.forEach(a => {
            const li = document.createElement('li');
            li.textContent = a;
            actionsList.appendChild(li);
          });
          document.getElementById('insights').style.display = 'block';
        });

    </script>
  </body>
</html>
